<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Overview - Pro Live</title>
    <style>
        :root {
            --bg-dark: #0b1118;
            --sidebar-bg: #111a24;
            --accent-blue: #3861fb;
            --text-grey: #bdc3c7;
            --border: #1a222d;
            --accent-green: #00ff00;
            --accent-red: #ff4d4d;
            --card-light: #1c2531;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            height: 65px;
            background-color: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .back-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-grey); font-weight: 600; }
        .logo-sphere {
            width: 40px; height: 40px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f39c12 10%, #d35400 40%, #2c3e50 90%);
            display: flex; justify-content: center; align-items: center;
        }
        .knight-icon { font-size: 20px; color: black; }

        /* --- MARKET CONTENT --- */
        .market-title-section { padding: 25px 15px 10px; }
        .market-title { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .market-subtitle { color: var(--text-grey); font-size: 0.85rem; margin-top: 5px; }

        .search-container { padding: 15px; }
        .search-bar { 
            background: #1a1f26; border-radius: 12px; padding: 12px 15px; 
            display: flex; align-items: center; gap: 10px; border: 1px solid var(--border);
        }
        .search-bar input {
            background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 0.95rem;
        }

        .market-tabs { display: flex; gap: 20px; padding: 10px 15px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .m-tab { padding-bottom: 10px; color: var(--text-grey); font-size: 0.9rem; font-weight: 600; cursor: pointer; position: relative; white-space: nowrap; }
        .m-tab.active { color: white; }
        .m-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent-blue); }

        /* --- INTEGRATED STATEMENT STYLES --- */
        .statement-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .history-trigger { cursor: pointer; display: flex; align-items: center; gap: 8px; color: white; font-weight: bold; font-size: 0.8rem; }
        
        .modal-statement { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 5000; display: none; overflow-y: auto; }
        .filter-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--sidebar-bg); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        .filter-btn { padding: 6px 12px; background: #1a1f26; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; color: var(--text-grey); border: 1px solid var(--border); cursor: pointer; }
        .filter-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        .date-picker-input { background: #1a1f26; border: 1px solid var(--border); color: white; border-radius: 20px; padding: 5px 10px; font-size: 0.7rem; outline: none; }
        
        .statement-row { padding: 15px; border-bottom: 1px solid #111a24; display: flex; justify-content: space-between; align-items: center; }
        .s-side { font-weight: bold; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }

        #market-list { display: flex; flex-direction: column; }
        .market-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #111a24; transition: 0.2s; }
        .market-item:active { background: #161e29; }
        .market-left { display: flex; align-items: center; gap: 12px; }
        .coin-img { width: 32px; height: 32px; border-radius: 50%; }
        .coin-name { font-weight: bold; font-size: 1rem; }
        .coin-rank { background: #1a1f26; color: var(--text-grey); font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .market-right { text-align: right; }
        .coin-price { font-weight: bold; font-size: 0.95rem; }
        .coin-change { font-size: 0.8rem; margin-top: 3px; }

        .loader { padding: 50px; text-align: center; color: var(--text-grey); }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- QUANT VIEW STYLES --- */
        #quant-view { display: none; padding-bottom: 50px; }
        .exec-card { background: var(--sidebar-bg); margin: 10px 15px; border-radius: 12px; padding: 15px; border: 1px solid var(--border); border-left: 4px solid var(--accent-blue); }
        .exec-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .exec-label { color: var(--text-grey); font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .profit-green { color: var(--accent-green); font-weight: bold; font-family: monospace; }
        .live-pulse { width: 8px; height: 8px; background: var(--accent-blue); border-radius: 50%; animation: pulse 1.5s infinite; display: inline-block; margin-right: 5px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background-color: var(--bg-dark); border-top: 1px solid var(--border); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-grey); font-size: 10px; font-weight: 600; gap: 5px; }
        .nav-tab.active { color: var(--accent-blue); }
        .nav-icon { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2.2; }
    </style>
</head>
<body>

    <header class="header">
        <div class="back-trigger" onclick="window.location.href='index.html'">
            <span>←</span> Back
        </div>
        <div class="logo-sphere"><span class="knight-icon">♞</span></div>
        <div style="width: 40px;"></div> </header>

    <main id="main-content">
        <section class="market-title-section" id="title-sec">
            <h1 class="market-title">Markets</h1>
            <div class="market-subtitle">Real-time global exchange data</div>
        </section>

        <div class="search-container" id="search-sec">
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="market-search" placeholder="Search coin name..." oninput="handleSearch()">
            </div>
        </div>

        <div class="market-tabs">
            <div class="m-tab active" onclick="filterMarket('all', this)">All Assets</div>
            <div class="m-tab" onclick="filterMarket('gainers', this)">Gainers</div>
            <div class="m-tab" onclick="filterMarket('losers', this)">Losers</div>
            <div class="m-tab" style="color: var(--accent-blue);" onclick="activateQuant(this)">
                <div class="live-pulse"></div> Quant Execution
            </div>
        </div>

        <div id="normal-view">
            <div class="list-header" style="display:flex; justify-content: space-between; padding: 15px; font-size: 0.75rem; color: #5d6d7e; font-weight: bold;">
                <span>Asset Name</span>
                <span>Last Price / 24h Change</span>
            </div>
            <section id="market-list">
                <div class="loader"><div class="spinner"></div>Synchronizing Data...</div>
            </section>
        </div>

        <div id="quant-view">
            <div class="statement-header">
                <div>
                    <div style="font-size: 0.65rem; color: var(--text-grey); text-transform: uppercase; letter-spacing: 1px; font-weight: 800;">Institutional Net Equity</div>
                    <div id="balance-display" style="font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;">$0.00</div>
                </div>
                <div class="history-trigger" onclick="openStatement()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="6" width="18" height="15" rx="2" stroke="white" stroke-width="2"/>
                        <path d="M3 10H21" stroke="white" stroke-width="2"/>
                        <rect x="7" y="13" width="10" height="2" rx="1" fill="white"/>
                        <circle cx="7" cy="17" r="1" fill="white"/>
                        <circle cx="10.5" cy="17" r="1" fill="white"/>
                        <circle cx="14" cy="17" r="1" fill="white"/>
                        <circle cx="17.5" cy="17" r="1" fill="white"/>
                        <path d="M8 4V7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M16 4V7" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            
            <div id="tradingview_widget" style="height: 140px; width: 100%; border-bottom: 1px solid var(--border);"></div>
            <div id="execution-log" style="padding-top: 10px;"></div>
        </div>
    </main>

    <div id="statement-modal" class="modal-statement">
        <div class="header" style="position: sticky; top: 0; background: var(--bg-dark); border-bottom: 1px solid var(--border); z-index: 100;">
            <div class="back-trigger" onclick="closeStatement()"><span>✕</span> Close Statement</div>
            <div style="font-weight: bold;">Past Transactions</div>
            <div style="width: 40px;"></div>
        </div>
        <div class="filter-bar">
            <div class="filter-btn active" onclick="filterHistory('all', this)">All</div>
            <div class="filter-btn" onclick="filterHistory('today', this)">Today</div>
            <div class="filter-btn" onclick="filterHistory('week', this)">7D</div>
            <div class="filter-btn" onclick="filterHistory('month', this)">30D</div>
            <input type="date" class="date-picker-input" onchange="filterHistory('custom', this)">
        </div>
        <div id="statement-list"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-tab"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></a>
        <a href="javascript:void(0)" class="nav-tab">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 10l5-5 5 5M17 14l-5 5-5-5" />
                <path d="M12 5v14" />
            </svg>
            <span>Deposit & Withdrawal</span>
        </a>
        <a href="market.html" class="nav-tab active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/></svg><span>Market</span></a>
        <a href="javascript:void(0)" class="nav-tab"><svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/></svg><span>Portfolio</span></a>
        <a href="javascript:void(0)" class="nav-tab"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Community</span></a>
    </nav>

    <script src="bot.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let fullMarketData = [];
        let displayData = [];
        let tvInitialized = false;

        /* --- INTEGRATED FILTERING LOGIC --- */
        function openStatement() {
            document.getElementById('statement-modal').style.display = 'block';
            filterHistory('all', document.querySelector('.filter-btn.active'));
        }
        
        function closeStatement() { document.getElementById('statement-modal').style.display = 'none'; }

        function filterHistory(range, trigger) {
            if (trigger && trigger.tagName === 'DIV') {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                trigger.classList.add('active');
            }
            
            const container = document.getElementById('statement-list');
            const history = JSON.parse(localStorage.getItem('trade_history')) || [];
            const now = new Date();
            
            const filtered = history.filter(trade => {
                const tDate = new Date(trade.rawDate || Date.now());
                if (range === 'today') return tDate.toDateString() === now.toDateString();
                if (range === 'week') return (now - tDate) < (7 * 24 * 60 * 60 * 1000);
                if (range === 'month') return (now - tDate) < (30 * 24 * 60 * 60 * 1000);
                if (range === 'custom') return tDate.toISOString().split('T')[0] === trigger.value;
                return true;
            });

            container.innerHTML = filtered.length ? '' : '<div style="padding:40px; text-align:center; color:var(--text-grey);">No transactions found for this period.</div>';
            
            filtered.forEach(trade => {
                const isLong = trade.side === 'LONG';
                container.innerHTML += `
                    <div class="statement-row">
                        <div>
                            <div class="s-side" style="background:${isLong ? 'rgba(0,255,0,0.1)' : 'rgba(255,0,0,0.1)'}; color:${isLong ? 'var(--accent-green)' : 'var(--accent-red)'}">${trade.side} BTC/USDT</div>
                            <div style="font-size:0.85rem; font-weight:bold;">$${trade.entryPrice} → $${trade.exitPrice || trade.entryPrice}</div>
                            <div style="font-size:0.75rem; color:#5d6d7e; margin-top:4px;">${new Date(trade.rawDate || Date.now()).toLocaleDateString()} | ${trade.openTime} - ${trade.closeTime}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="color:var(--accent-green); font-weight:900; font-family:monospace; font-size:1rem;">+$${trade.profit}</div>
                            <div style="font-size:0.65rem; color:#5d6d7e;">SETTLED</div>
                        </div>
                    </div>`;
            });
        }

        /* --- UI REFRESH LOGIC --- */
        function refreshQuantUI() {
            const log = document.getElementById('execution-log');
            const display = document.getElementById('balance-display');
            const history = JSON.parse(localStorage.getItem('trade_history')) || [];
            const isExecuting = localStorage.getItem('bot_is_executing') === 'true';

            const savedBal = localStorage.getItem('investmentBalance');
            if (display && savedBal) display.innerText = "$" + parseFloat(savedBal).toLocaleString(undefined, {minimumFractionDigits: 2});

            if (!log) return;
            log.innerHTML = ''; 

            if (isExecuting) {
                const side = localStorage.getItem('last_trade_side');
                const price = localStorage.getItem('last_entry_price');
                const openTime = localStorage.getItem('last_open_time');
                const isLong = side === 'LONG';
                
                const activeCard = document.createElement('div');
                activeCard.className = 'exec-card';
                activeCard.style.borderLeftColor = isLong ? 'var(--accent-green)' : 'var(--accent-red)';
                activeCard.innerHTML = `
                    <div class="exec-row">
                        <span style="font-weight:bold;">BTC/USDT <span style="color:${isLong ? 'var(--accent-green)' : 'var(--accent-red)'}">${side}</span></span>
                        <span style="color:orange; font-weight:bold; font-size:0.65rem;">● EXECUTING</span>
                    </div>
                    <div class="exec-row"><span class="exec-label">Entry Price</span><span style="font-weight:bold;">$${price}</span></div>
                    <div class="exec-row"><span class="exec-label">Start Time</span><span>${openTime}</span></div>
                `;
                log.appendChild(activeCard);
            }

            history.slice(0, 10).forEach(trade => {
                const isLong = trade.side === 'LONG';
                const card = document.createElement('div');
                card.className = 'exec-card';
                card.style.borderLeftColor = isLong ? 'var(--accent-green)' : 'var(--accent-red)';
                card.innerHTML = `
                    <div class="exec-row">
                        <span style="font-weight:bold;">BTC/USDT <span style="color:${isLong ? 'var(--accent-green)' : 'var(--accent-red)'}">${trade.side}</span></span>
                        <span style="color:var(--text-grey); font-weight:bold; font-size:0.65rem;">● CLOSED</span>
                    </div>
                    <div class="exec-row"><span class="exec-label">Settlement</span><span style="font-weight:bold;">$${trade.entryPrice} → $${trade.exitPrice || trade.entryPrice}</span></div>
                    <div class="exec-row" style="margin-top:5px; border-top:1px solid #1a222d; padding-top:5px;">
                        <span class="exec-label">Net Profit</span>
                        <span class="profit-green">+$${trade.profit}</span>
                    </div>
                `;
                log.appendChild(card);
            });
        }

        window.addEventListener('storage', refreshQuantUI);

        async function fetchMarketData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1&sparkline=false&price_change_percentage=24h');
                fullMarketData = await response.json();
                displayData = [...fullMarketData];
                renderMarket();
            } catch (e) {
                document.getElementById('market-list').innerHTML = '<div class="loader">Failed to load market data.</div>';
            }
        }

        function activateQuant(tabEl) {
            document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            document.getElementById('normal-view').style.display = 'none';
            document.getElementById('title-sec').style.display = 'none';
            document.getElementById('search-sec').style.display = 'none';
            document.getElementById('quant-view').style.display = 'block';
            refreshQuantUI();
            if (!tvInitialized) {
                new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "timezone": "Etc/UTC", "theme": "dark", "style": "1", "container_id": "tradingview_widget", "hide_top_toolbar": true, "save_image": false });
                tvInitialized = true;
            }
        }

        function filterMarket(type, tabEl) {
            document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            document.getElementById('quant-view').style.display = 'none';
            document.getElementById('normal-view').style.display = 'block';
            document.getElementById('title-sec').style.display = 'block';
            document.getElementById('search-sec').style.display = 'block';

            if (type === 'all') displayData = [...fullMarketData];
            else if (type === 'gainers') displayData = [...fullMarketData].sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h).slice(0, 15);
            else if (type === 'losers') displayData = [...fullMarketData].sort((a, b) => a.price_change_percentage_24h - b.price_change_percentage_24h).slice(0, 15);
            renderMarket();
        }

        function renderMarket() {
            const container = document.getElementById('market-list');
            if(!container) return;
            container.innerHTML = '';
            displayData.forEach(coin => {
                const price = coin.current_price.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                const change = coin.price_change_percentage_24h?.toFixed(2) || "0.00";
                const color = change >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
                container.innerHTML += `
                    <div class="market-item">
                        <div class="market-left">
                            <img src="${coin.image}" class="coin-img">
                            <div>
                                <div class="coin-name">${coin.name} <span class="coin-rank">#${coin.market_cap_rank}</span></div>
                                <div style="font-size:0.75rem; color:#5d6d7e; margin-top:2px;">${coin.symbol.toUpperCase()}</div>
                            </div>
                        </div>
                        <div class="market-right">
                            <div class="coin-price">${price}</div>
                            <div class="coin-change" style="color:${color}">${change >= 0 ? '+' : ''}${change}%</div>
                        </div>
                    </div>`;
            });
        }

        function handleSearch() {
            const query = document.getElementById('market-search').value.toLowerCase();
            displayData = fullMarketData.filter(coin => coin.name.toLowerCase().includes(query) || coin.symbol.toLowerCase().includes(query));
            renderMarket();
        }

        window.onload = fetchMarketData;
    </script>
</body>
</html>
