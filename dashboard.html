<!DOCTYPE html>
<html>
<head>
<title>Crypto Dashboard - JoinTheRealWorld</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#111; }
header h2 { margin:0; }
header button { padding:8px 16px; border:none; border-radius:6px; background:#00e676; cursor:pointer; font-weight:bold; }
.crypto-container { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
.crypto-card { background:#1a1a1a; margin:10px; padding:15px; border-radius:12px; width:220px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.5); }
.crypto-card img { width:40px; height:40px; border-radius:50%; margin-bottom:10px; }
.crypto-card canvas { margin-top:10px; }
.green { color:#00e676; }
.red { color:#ff4d4d; }
h3 { text-align:center; margin-top:40px; }
</style>
</head>
<body>

<header>
  <h2>Crypto Dashboard</h2>
  <button onclick="location.href='login.html'">Logout</button>
</header>

<h3>Top 20 Cryptocurrencies</h3>
<div id="crypto" class="crypto-container"></div>

<script>
const charts = {};
async function loadCrypto(){
  // Fetch top 20 coins by market cap
  const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=true');
  const data = await res.json();

  let html = '';
  data.forEach(c => {
    let changeClass = c.price_change_percentage_24h >= 0 ? 'green' : 'red';
    html += `<div class="crypto-card">
      <img src="${c.image}" alt="${c.name} logo">
      <h4>${c.name} (${c.symbol.toUpperCase()})</h4>
      <p class="${changeClass}">$${c.current_price.toLocaleString()}</p>
      <p class="${changeClass}">${c.price_change_percentage_24h.toFixed(2)}%</p>
      <p>Market Cap: $${c.market_cap.toLocaleString()}</p>
      <canvas id="sparkline-${c.id}" height="50"></canvas>
    </div>`;
  });
  document.getElementById('crypto').innerHTML = html;

  // Create or update sparklines for each coin
  data.forEach(c => {
    const ctx = document.getElementById(`sparkline-${c.id}`).getContext('2d');
    if(charts[c.id]){
      charts[c.id].data.datasets[0].data = c.sparkline_in_7d.price;
      charts[c.id].update();
    } else {
      charts[c.id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: c.sparkline_in_7d.price.map((_,i)=>i),
          datasets: [{
            data: c.sparkline_in_7d.price,
            borderColor: c.price_change_percentage_24h >=0 ? '#00e676' : '#ff4d4d',
            borderWidth: 2,
            fill: false,
            tension: 0.3,
          }]
        },
        options: {
          responsive:true,
          plugins:{legend:{display:false}},
          scales:{x:{display:false}, y:{display:false}}
        }
      });
    }
  });
}

// Refresh every 10 seconds
loadCrypto();
setInterval(loadCrypto, 10000);
</script>

</body>
</html>
