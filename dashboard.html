<!DOCTYPE html>
<html>
<head>
  <title>Live Crypto Dashboard - JoinTheRealWorld</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#111; }
    header h2 { margin:0; }
    header button { padding:8px 16px; border:none; border-radius:6px; background:#00e676; cursor:pointer; font-weight:bold; }
    .crypto-container { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
    .crypto-card { background:#1a1a1a; margin:10px; padding:15px; border-radius:12px; width:220px; text-align:center; box-shadow:0 0 10px rgba(0,0,0,0.5);}
    .crypto-card img { width:40px; height:40px; border-radius:50%; margin-bottom:10px; }
    .green { color:#00e676; }
    .red { color:#ff4d4d; }
    canvas { margin-top:10px; }
  </style>
</head>
<body>

<header>
  <h2>Top Cryptos Live</h2>
  <button onclick="location.href='login.html'">Logout</button>
</header>

<div id="crypto" class="crypto-container"></div>

<script>
const topCoins = ['bitcoin','ethereum','binancecoin','tether','cardano','solana','ripple','polkadot','dogecoin','matic-network']; // Top 10
const charts = {};
const maxPoints = 30; // last 30 points

async function fetchCrypto() {
  const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${topCoins.join(',')}&order=market_cap_desc&per_page=10&page=1&sparkline=false`);
  const data = await res.json();
  let html = '';
  data.forEach(c => {
    const changeClass = c.price_change_percentage_24h >= 0 ? 'green' : 'red';
    html += `
      <div class="crypto-card">
        <img src="${c.image}" alt="${c.name} logo">
        <h4>${c.name} (${c.symbol.toUpperCase()})</h4>
        <p class="${changeClass}">$${c.current_price.toLocaleString()}</p>
        <p class="${changeClass}">${c.price_change_percentage_24h.toFixed(2)}%</p>
        <canvas id="chart-${c.id}" height="80"></canvas>
      </div>
    `;
  });
  document.getElementById('crypto').innerHTML = html;

  // Update charts
  data.forEach(c => {
    const ctx = document.getElementById(`chart-${c.id}`).getContext('2d');
    if(!charts[c.id]){
      charts[c.id] = new Chart(ctx, {
        type:'line',
        data: { labels:[], datasets:[{data:[], borderColor:'#00e676', borderWidth:2, fill:false}] },
        options:{ responsive:true, plugins:{legend:{display:false}}, scales:{ x:{display:false}, y:{display:true} } }
      });
    }
    const chart = charts[c.id];
    chart.data.labels.push('');
    chart.data.datasets[0].data.push(c.current_price);
    if(chart.data.labels.length > maxPoints){
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }
    chart.update();
  });
}

// Initial load
fetchCrypto();
// Update every 1 second (1000ms)
setInterval(fetchCrypto,1000);
</script>

</body>
</html>
