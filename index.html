<!DOCTYPE html>
<html>
<head>
<title>JoinTheRealWorld - Enroll</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
header { padding:20px; text-align:center; background:#111; font-size:24px; font-weight:bold; }
button { padding:12px 20px; border:none; border-radius:8px; font-weight:bold; margin:10px; background:#00e676; cursor:pointer; }
.container { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
.card { background:#1a1a1a; margin:10px; padding:15px; border-radius:10px; width:200px; text-align:center; }
img { width:70px; border-radius:50%; }
.green { color:#00e676; }
.form { text-align:center; margin-top:30px; }
a { color:#00e676; text-decoration:none; }
</style>
</head>

<body>

<header>JoinTheRealWorld 🚀</header>

<div class="form">
  <h2>Enroll Now</h2>
  <input placeholder="Email"><br>
  <input placeholder="Password" type="password"><br>
  <button onclick="location.href='signup.html'">Join Now</button>
</div>

<h2 style="text-align:center; margin-top:40px;">Top Earners</h2>

<div class="container">
  <div class="card">
    <img src="https://randomuser.me/api/portraits/men/11.jpg">
    <h4>Daniel M.</h4>
    <p class="green">$1,500/week</p>
    <p>Copywriting</p>
  </div>
  <div class="card">
    <img src="https://randomuser.me/api/portraits/women/22.jpg">
    <h4>Lisa R.</h4>
    <p class="green">$3,200/week</p>
    <p>Ecommerce</p>
  </div>
  <div class="card">
    <img src="https://randomuser.me/api/portraits/men/45.jpg">
    <h4>Chris D.</h4>
    <p class="green">$2,400/week</p>
    <p>SMMA</p>
  </div>
</div>

<h2 style="text-align:center; margin-top:40px;">Live Crypto</h2>
<div id="crypto" class="container"></div>

<canvas id="chart" style="max-width:600px; margin:auto;"></canvas>

<script>
async function loadCrypto(){
  let res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin,ethereum,binancecoin');
  let data = await res.json();
  let html='';
  data.forEach(c=>{
    html += `<div class="card"><h4>${c.name}</h4><p class="green">$${c.current_price}</p></div>`;
  });
  document.getElementById('crypto').innerHTML=html;
}
loadCrypto();

new Chart(document.getElementById('chart'), {
  type:'line',
  data:{labels:['Mon','Tue','Wed','Thu','Fri'],datasets:[{label:'Earnings',data:[1500,3200,2400,4100,5000],borderColor:'#00e676',fill:false}]}
});
</script>

<p style="text-align:center; margin-top:30px;">Already have an account? <a href="login.html">Login here</a></p>

</body>
</html>
