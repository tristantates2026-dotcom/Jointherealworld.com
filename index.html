<script>
const cryptoContainer = document.getElementById('crypto');

// Function to fetch crypto data
async function loadCrypto() {
  try {
    let res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false');
    let data = await res.json();
    let html = '';
    data.forEach(c => {
      html += `
        <div class="card">
          <img src="${c.image}" alt="${c.name}">
          <h4>${c.name}</h4>
          <p class="green">$${c.current_price.toLocaleString()}</p>
          <p style="color:${c.price_change_percentage_24h >= 0 ? '#00e676' : '#ff3d00'}">
            ${c.price_change_percentage_24h.toFixed(2)}% (24h)
          </p>
        </div>
      `;
    });
    cryptoContainer.innerHTML = html;
  } catch (err) {
    cryptoContainer.innerHTML = '<p style="color:red;">Error loading crypto data</p>';
    console.error(err);
  }
}

// Load initially
loadCrypto();

// Update every 30 seconds
setInterval(loadCrypto, 30000);
</script>
