<!DOCTYPE html>
<html>
<head>
<title>Login - JoinTheRealWorld</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; background:#0d0d0d; color:#fff; font-family:Arial; }
.box { background:#1a1a1a; padding:30px; border-radius:12px; width:90%; max-width:350px; text-align:center; }
input { width:90%; padding:12px; margin:10px 0; border-radius:6px; border:none; }
button { width:95%; padding:12px; background:#00e676; border:none; border-radius:8px; font-weight:bold; margin-top:10px; cursor:pointer; }
a { color:#00e676; text-decoration:none; }
h2 { margin-bottom:20px; }
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<p><a href="forgot.html">Forgot Password?</a></p>

<button onclick="location.href='dashboard.html'">Login</button>

<p style="margin-top:15px;">Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

</body>
</html>
